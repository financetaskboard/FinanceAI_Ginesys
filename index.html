<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ginesys — App Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f0f7;
    --nav-bg: #875A7B;
    --nav-bg2: #714B67;
    --white: #ffffff;
    --border: #e0e0eb;
    --text: #2c2c3c;
    --muted: #8f8fa8;
    --shadow: 0 2px 12px rgba(44,44,60,0.09);
    --shadow-hover: 0 8px 32px rgba(44,44,60,0.16);
    --radius: 14px;
    --font: 'Nunito', sans-serif;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  .topnav {
    background: linear-gradient(90deg, var(--nav-bg), var(--nav-bg2));
    height: 52px; display: flex; align-items: center; padding: 0 20px; gap: 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 9px;
    color: white; font-weight: 800; font-size: 1.15rem;
    letter-spacing: -0.01em; text-decoration: none; flex-shrink: 0;
  }
  .g-logo {
    width: 30px; height: 30px; border-radius: 7px;
    background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 900; color: white;
  }
  .nav-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.25); margin: 0 4px; }
  .nav-search { flex: 1; max-width: 360px; position: relative; }
  .nav-search input {
    width: 100%; height: 30px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25); border-radius: 6px;
    color: white; font-family: var(--font); font-size: 0.82rem;
    padding: 0 12px 0 32px; outline: none; transition: background 0.2s;
  }
  .nav-search input::placeholder { color: rgba(255,255,255,0.6); }
  .nav-search input:focus { background: rgba(255,255,255,0.22); }
  .s-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.7; }
  .nav-spacer { flex: 1; }
  .nav-actions { display: flex; align-items: center; gap: 5px; }
  .nav-btn {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85); cursor: pointer; transition: background 0.18s;
    border: none; background: transparent; position: relative;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.15); color: white; }
  .badge {
    position: absolute; top: 3px; right: 3px;
    width: 16px; height: 16px; background: #e74c3c; border-radius: 50%;
    font-size: 0.58rem; font-weight: 700; color: white;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--nav-bg);
  }
  .nav-user {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.9); font-size: 0.82rem; font-weight: 700;
    cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: background 0.18s;
  }
  .nav-user:hover { background: rgba(255,255,255,0.12); }
  .avatar {
    width: 30px; height: 30px; background: rgba(255,255,255,0.22); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.78rem; color: white;
    border: 2px solid rgba(255,255,255,0.35);
  }

  /* BANNER */
  .banner {
    background: #fff3cd; border-bottom: 1px solid #ffc107;
    padding: 9px 24px; font-size: 0.82rem; color: #856404;
    display: flex; align-items: center; gap: 8px;
  }
  .banner a { color: #5a3e00; text-decoration: underline; cursor: pointer; }
  .banner-close { margin-left: auto; cursor: pointer; opacity: 0.5; font-size: 1rem; border: none; background: none; color: #856404; }
  .banner-close:hover { opacity: 1; }

  /* MAIN */
  .main { padding: 48px 32px 80px; max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 22px; padding-left: 2px;
  }

  /* GRID */
  .app-grid {
    display: flex; flex-wrap: wrap; gap: 16px;
    align-items: flex-start;
  }

  /* TILE */
  .app-tile {
    width: 124px; display: flex; flex-direction: column;
    align-items: center; gap: 10px; cursor: pointer;
    text-decoration: none; color: var(--text);
    animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
    -webkit-user-select: none; user-select: none;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.78) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .app-icon-box {
    width: 96px; height: 96px;
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s;
    position: relative; overflow: hidden;
  }
  .app-tile:hover .app-icon-box {
    transform: translateY(-5px) scale(1.05);
    box-shadow: var(--shadow-hover);
  }
  .app-icon-box .emoji { font-size: 2.6rem; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2)); }
  .app-name { font-size: 0.8rem; font-weight: 600; text-align: center; color: #4a4a6a; line-height: 1.3; }

  /* ADD TILE */
  .add-tile {
    width: 124px; display: flex; flex-direction: column;
    align-items: center; gap: 10px; cursor: pointer;
    animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) 0.35s both;
  }
  .add-box {
    width: 96px; height: 96px; border-radius: var(--radius);
    background: white; border: 2px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.22s; color: var(--muted);
  }
  .add-tile:hover .add-box {
    border-color: var(--nav-bg); background: rgba(135,90,123,0.05);
    color: var(--nav-bg); transform: translateY(-3px);
  }
  .add-tile .app-name { color: var(--muted); }
  .add-tile:hover .app-name { color: var(--nav-bg); }

  /* CONTEXT MENU */
  .ctx {
    position: fixed; background: white; border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow-hover);
    z-index: 600; overflow: hidden; min-width: 140px; display: none;
  }
  .ctx.show { display: block; }
  .ctx-item {
    padding: 10px 16px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 9px;
    transition: background 0.14s; color: var(--text);
  }
  .ctx-item:hover { background: var(--bg); }
  .ctx-item.red { color: #e74c3c; }
  .ctx-item.red:hover { background: #fff0f0; }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0; background: rgba(44,44,60,0.5);
    backdrop-filter: blur(5px); z-index: 500;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.22s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white; border-radius: 18px;
    width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(44,44,60,0.28);
    transform: translateY(24px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
  }
  .overlay.open .modal { transform: none; }
  .m-head {
    background: linear-gradient(90deg, var(--nav-bg), var(--nav-bg2));
    padding: 22px 28px; border-radius: 18px 18px 0 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .m-head h2 { color: white; font-size: 1.05rem; font-weight: 700; }
  .m-close {
    width: 28px; height: 28px; background: rgba(255,255,255,0.2);
    border: none; border-radius: 50%; color: white; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.18s;
  }
  .m-close:hover { background: rgba(255,255,255,0.35); }
  .m-body { padding: 24px 28px; }

  .ep { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .eo {
    width: 40px; height: 40px; border-radius: 9px;
    border: 2px solid var(--border); font-size: 1.35rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; background: var(--bg);
  }
  .eo:hover, .eo.sel { border-color: var(--nav-bg); background: rgba(135,90,123,0.08); }

  .fg { margin-bottom: 16px; }
  .fg label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
  .fg input {
    width: 100%; height: 40px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: var(--font); font-size: 0.88rem;
    padding: 0 13px; color: var(--text); outline: none;
    transition: border-color 0.18s;
  }
  .fg input:focus { border-color: var(--nav-bg); }

  .cg { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .cs {
    width: 34px; height: 34px; border-radius: 8px;
    border: 2.5px solid transparent; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .cs:hover { transform: scale(1.15); }
  .cs.sel { border-color: #2c2c3c; transform: scale(1.1); }

  .m-foot { padding: 14px 28px 24px; display: flex; gap: 10px; }
  .m-foot button {
    flex: 1; height: 42px; border-radius: 9px; border: none;
    font-family: var(--font); font-size: 0.88rem; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
  }
  .b-cancel { background: var(--bg); color: var(--muted); }
  .b-cancel:hover { background: var(--border); color: var(--text); }
  .b-save { background: linear-gradient(90deg, var(--nav-bg), var(--nav-bg2)); color: white; }
  .b-save:hover { filter: brightness(1.1); }

  @media(max-width:600px) {
    .nav-search { display: none; }
    .main { padding: 32px 16px 60px; }
    .app-tile, .add-tile { width: 104px; }
    .app-icon-box, .add-box { width: 84px; height: 84px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <a class="nav-logo" href="#">
    <div class="g-logo">G</div>
    Ginesys
  </a>
  <div class="nav-divider"></div>
  <div class="nav-search">
    <svg class="s-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search apps…" id="searchInput" oninput="filterApps(this.value)"/>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-actions">
    <button class="nav-btn" title="Messages">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="badge">2</span>
    </button>
    <button class="nav-btn" title="Activity">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </button>
    <button class="nav-btn" title="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="nav-user">
      <div class="avatar">K</div>
      Ginesys
    </div>
  </div>
</nav>

<!-- BANNER -->
<div class="banner" id="banner">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  Your subscription is pending. This database will be deactivated in <strong>&nbsp;4 days&nbsp;</strong> unless you take action.&nbsp;
  <a href="#">Go to our Customer Portal</a>
  <button class="banner-close" onclick="document.getElementById('banner').remove()">✕</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="section-label" id="secLabel">My Applications</div>
  <div class="app-grid" id="appGrid"></div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx" id="ctxMenu">
  <div class="ctx-item" onclick="ctxEdit()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit
  </div>
  <div class="ctx-item red" onclick="ctxDelete()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
    Delete
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-head">
      <h2 id="mTitle">Add Application</h2>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body">
      <div class="fg">
        <label>Icon</label>
        <div class="ep" id="emojiPicker"></div>
      </div>
      <div class="fg">
        <label>App Name</label>
        <input type="text" id="fName" placeholder="e.g. GST Dashboard"/>
      </div>
      <div class="fg">
        <label>URL (Link)</label>
        <input type="url" id="fUrl" placeholder="https://yourapp.github.io"/>
      </div>
      <div class="fg">
        <label>Colour Theme</label>
        <div class="cg" id="colorGrid"></div>
      </div>
    </div>
    <div class="m-foot">
      <button class="b-cancel" onclick="closeModal()">Cancel</button>
      <button class="b-save" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['📊','📋','🧾','💰','📈','🏦','🔍','📑','🗂️','💼','🧮','📉','🤖','⚙️','🛡️','✅','📝','💹','🖥️','📌'];

const PALETTES = [
  'linear-gradient(135deg,#875A7B,#6b4560)',
  'linear-gradient(135deg,#00a09d,#007a78)',
  'linear-gradient(135deg,#e2a925,#c4891a)',
  'linear-gradient(135deg,#1e73be,#155a9a)',
  'linear-gradient(135deg,#28b463,#1e8b4c)',
  'linear-gradient(135deg,#e74c3c,#c0392b)',
  'linear-gradient(135deg,#8e44ad,#6c3483)',
  'linear-gradient(135deg,#2c3e50,#1a252f)',
  'linear-gradient(135deg,#f39c12,#d68910)',
  'linear-gradient(135deg,#16a085,#0d6b5c)',
  'linear-gradient(135deg,#c0392b,#922b21)',
  'linear-gradient(135deg,#2980b9,#1a6ea0)',
  'linear-gradient(135deg,#d35400,#a94300)',
  'linear-gradient(135deg,#7f8c8d,#5d6d7e)',
  'linear-gradient(135deg,#6c5ce7,#4834d4)',
  'linear-gradient(135deg,#00b894,#00897b)',
];

const DEFAULTS = [
  { id:1, name:'Task Flows',  emoji:'📋', url:'https://financetaskboard.github.io/ginesys/',      ci:0 },
  { id:2, name:'GST Audit',   emoji:'🧾', url:'https://gst-audit-portal-1.onrender.com/',         ci:2 },
  { id:3, name:'TDS Audit',   emoji:'📊', url:'https://two6as-reconciliation.onrender.com/',      ci:3 },
];

let apps = JSON.parse(localStorage.getItem('gsys_apps2') || 'null') || JSON.parse(JSON.stringify(DEFAULTS));
let nid = Math.max(...apps.map(a=>a.id), 0) + 1;
let editId = null, ctxId = null;
let selEmoji = EMOJIS[0], selCi = 0;

/* ── RENDER ── */
function render(q='') {
  const grid = document.getElementById('appGrid');
  document.getElementById('secLabel').textContent = q ? `Results for "${q}"` : 'My Applications';
  const list = q ? apps.filter(a=>a.name.toLowerCase().includes(q.toLowerCase())) : apps;

  let h = list.map((a,i) => `
    <a class="app-tile" href="${a.url}" target="_blank"
       style="animation-delay:${i*0.06}s"
       oncontextmenu="showCtx(event,${a.id})">
      <div class="app-icon-box" style="background:${PALETTES[a.ci||0]}">
        <span class="emoji">${a.emoji}</span>
      </div>
      <span class="app-name">${a.name}</span>
    </a>`).join('');

  h += `<div class="add-tile" onclick="openModal(null)" style="animation-delay:${list.length*0.06}s">
    <div class="add-box">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10" stroke-dasharray="3 2"/>
        <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </div>
    <span class="app-name">Add App</span>
  </div>`;

  grid.innerHTML = h;
}

function filterApps(v) { render(v); }

/* ── MODAL ── */
function openModal(id) {
  editId = id;
  if (id !== null) {
    const a = apps.find(x=>x.id===id);
    document.getElementById('fName').value = a.name;
    document.getElementById('fUrl').value = a.url;
    selEmoji = a.emoji; selCi = a.ci||0;
    document.getElementById('mTitle').textContent = 'Edit Application';
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fUrl').value = '';
    selEmoji = EMOJIS[0]; selCi = 0;
    document.getElementById('mTitle').textContent = 'Add Application';
  }
  buildPickers();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if(e.target.id==='overlay') closeModal(); });

function buildPickers() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e=>
    `<div class="eo${e===selEmoji?' sel':''}" onclick="pickEmoji('${e}',this)">${e}</div>`).join('');
  document.getElementById('colorGrid').innerHTML = PALETTES.map((p,i)=>
    `<div class="cs${i===selCi?' sel':''}" style="background:${p}" onclick="pickColor(${i},this)"></div>`).join('');
}
function pickEmoji(e,el) { selEmoji=e; document.querySelectorAll('.eo').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); }
function pickColor(i,el) { selCi=i; document.querySelectorAll('.cs').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); }

function saveApp() {
  const name = document.getElementById('fName').value.trim();
  const url  = document.getElementById('fUrl').value.trim();
  if (!name||!url) { alert('Name and URL are required.'); return; }
  if (editId!==null) {
    const i = apps.findIndex(a=>a.id===editId);
    apps[i] = {...apps[i], name, url, emoji:selEmoji, ci:selCi};
  } else {
    apps.push({ id:nid++, name, url, emoji:selEmoji, ci:selCi });
  }
  save(); closeModal(); render();
}

/* ── CONTEXT MENU ── */
function showCtx(e,id) {
  e.preventDefault();
  ctxId = id;
  const m = document.getElementById('ctxMenu');
  m.style.top = e.clientY+'px'; m.style.left = e.clientX+'px';
  m.classList.add('show');
}
function ctxEdit()   { closeCtx(); openModal(ctxId); }
function ctxDelete() {
  if (confirm('Remove this app?')) { apps = apps.filter(a=>a.id!==ctxId); save(); render(); }
  closeCtx();
}
function closeCtx() { document.getElementById('ctxMenu').classList.remove('show'); }
document.addEventListener('click', closeCtx);

function save() { localStorage.setItem('gsys_apps2', JSON.stringify(apps)); }

render();
</script>
</body>
</html>
