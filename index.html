<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ginesys — App Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f4f8;
    --nav-bg: #ffffff;
    --accent: #875A7B;
    --accent2: #714B67;
    --border: #e8e8f0;
    --text: #1a1a2e;
    --muted: #9494b0;
    --font: 'Nunito', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  .topnav {
    background: #fff; height: 56px; display: flex; align-items: center;
    padding: 0 28px; gap: 14px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
  .g-logo-wrap {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(135,90,123,0.38);
  }
  .g-logo-wrap span { font-size: 1rem; font-weight: 900; color: white; line-height: 1; }
  .nav-brand { font-size: 1.08rem; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
  .nav-brand em { color: var(--accent); font-style: normal; }
  .nav-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
  .nav-search { flex: 1; max-width: 330px; position: relative; }
  .nav-search input {
    width: 100%; height: 34px; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 9px; color: var(--text); font-family: var(--font); font-size: 0.83rem;
    padding: 0 14px 0 36px; outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .nav-search input::placeholder { color: var(--muted); }
  .nav-search input:focus { border-color: var(--accent); background: white; }
  .s-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .nav-spacer { flex: 1; }
  .nav-actions { display: flex; align-items: center; gap: 4px; }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); cursor: pointer; transition: background 0.18s, color 0.18s;
    border: none; background: transparent; position: relative;
  }
  .nav-btn:hover { background: var(--bg); color: var(--text); }
  .badge {
    position: absolute; top: 4px; right: 4px; width: 15px; height: 15px;
    background: #e74c3c; border-radius: 50%; font-size: 0.55rem; font-weight: 700;
    color: white; display: flex; align-items: center; justify-content: center; border: 2px solid white;
  }
  .nav-user {
    display: flex; align-items: center; gap: 9px; cursor: pointer;
    padding: 5px 10px; border-radius: 9px; transition: background 0.18s; margin-left: 4px;
  }
  .nav-user:hover { background: var(--bg); }
  .avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.78rem; color: white;
  }
  .nav-user-name { font-size: 0.83rem; font-weight: 700; color: var(--text); }

  /* MAIN */
  .main { padding: 44px 40px 80px; max-width: 1080px; margin: 0 auto; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
  .section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }
  .app-count { font-size: 0.72rem; font-weight: 600; color: var(--muted); background: white; border: 1.5px solid var(--border); border-radius: 20px; padding: 3px 10px; }

  /* GRID */
  .app-grid { display: flex; flex-wrap: wrap; gap: 4px; }

  /* TILE — Zoho style: no box, just icon + label */
  .app-tile {
    width: 112px; display: flex; flex-direction: column; align-items: center;
    gap: 11px; cursor: pointer; text-decoration: none; color: var(--text);
    padding: 16px 6px 14px; border-radius: 16px; transition: background 0.18s;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    -webkit-user-select: none; user-select: none;
  }
  .app-tile:hover { background: rgba(255,255,255,0.9); }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.82) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .app-icon-wrap {
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 3px 10px rgba(44,44,80,0.13));
    transition: filter 0.22s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .app-tile:hover .app-icon-wrap {
    transform: translateY(-5px) scale(1.08);
    filter: drop-shadow(0 8px 20px rgba(44,44,80,0.2));
  }
  .app-icon-wrap svg { width: 72px; height: 72px; display: block; }
  .app-name { font-size: 0.76rem; font-weight: 600; text-align: center; color: #4a4a6a; line-height: 1.3; max-width: 100px; }

  /* ADD TILE */
  .add-tile {
    width: 112px; display: flex; flex-direction: column; align-items: center;
    gap: 11px; cursor: pointer; padding: 16px 6px 14px; border-radius: 16px;
    transition: background 0.18s; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.32s both;
  }
  .add-tile:hover { background: rgba(255,255,255,0.9); }
  .add-icon-wrap {
    width: 72px; height: 72px; border-radius: 20px; background: white;
    border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center;
    transition: all 0.22s; color: var(--muted); box-shadow: 0 3px 10px rgba(44,44,80,0.08);
  }
  .add-tile:hover .add-icon-wrap { border-color: var(--accent); color: var(--accent); transform: translateY(-5px); }
  .add-tile .app-name { color: var(--muted); font-size: 0.76rem; font-weight: 600; }
  .add-tile:hover .app-name { color: var(--accent); }

  /* CONTEXT MENU */
  .ctx { position: fixed; background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(44,44,80,0.14); z-index: 600; overflow: hidden; min-width: 148px; display: none; }
  .ctx.show { display: block; }
  .ctx-item { padding: 11px 16px; font-size: 0.82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 9px; transition: background 0.14s; color: var(--text); }
  .ctx-item:hover { background: var(--bg); }
  .ctx-item.red { color: #e74c3c; }
  .ctx-item.red:hover { background: #fff0f0; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.45); backdrop-filter: blur(6px); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: white; border-radius: 20px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(26,26,46,0.22); transform: translateY(20px) scale(0.97); transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1); }
  .overlay.open .modal { transform: none; }
  .m-head { background: linear-gradient(90deg, var(--accent), var(--accent2)); padding: 22px 28px; border-radius: 20px 20px 0 0; display: flex; align-items: center; justify-content: space-between; }
  .m-head h2 { color: white; font-size: 1.05rem; font-weight: 700; }
  .m-close { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.18s; }
  .m-close:hover { background: rgba(255,255,255,0.35); }
  .m-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }
  .fg { display: flex; flex-direction: column; gap: 8px; }
  .fg label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; }
  .fg input { height: 40px; border: 1.5px solid var(--border); border-radius: 10px; padding: 0 14px; font-family: var(--font); font-size: 0.88rem; color: var(--text); outline: none; transition: border-color 0.18s; background: white; }
  .fg input:focus { border-color: var(--accent); }
  .ep { display: flex; flex-wrap: wrap; gap: 6px; }
  .eo { width: 36px; height: 36px; border-radius: 8px; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--bg); transition: all 0.15s; border: 2px solid transparent; }
  .eo:hover, .eo.sel { border-color: var(--accent); background: rgba(135,90,123,0.08); }
  .cg { display: flex; flex-wrap: wrap; gap: 8px; }
  .cs { width: 28px; height: 28px; border-radius: 7px; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .cs:hover, .cs.sel { border-color: #1a1a2e; transform: scale(1.1); }
  .m-foot { padding: 16px 28px 24px; display: flex; justify-content: flex-end; gap: 10px; }
  .b-cancel { height: 38px; padding: 0 18px; border-radius: 10px; border: 1.5px solid var(--border); background: white; font-family: var(--font); font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.18s; }
  .b-cancel:hover { background: var(--bg); }
  .b-save { height: 38px; padding: 0 22px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); font-family: var(--font); font-size: 0.85rem; font-weight: 700; cursor: pointer; color: white; transition: opacity 0.18s; }
  .b-save:hover { opacity: 0.88; }
</style>
</head>
<body>

<nav class="topnav">
  <a class="nav-logo" href="#">
    <div class="g-logo-wrap"><span>G</span></div>
    <span class="nav-brand">Ginesys <em>One</em></span>
  </a>
  <div class="nav-divider"></div>
  <div class="nav-search">
    <svg class="s-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search apps…" oninput="filterApps(this.value)"/>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-actions">
    <button class="nav-btn" title="Notifications">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge">3</span>
    </button>
    <button class="nav-btn" title="Settings">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="nav-user">
      <div class="avatar">K</div>
      <span class="nav-user-name">Ginesys</span>
    </div>
  </div>
</nav>

<div class="main">
  <div class="section-header">
    <div class="section-label" id="secLabel">My Applications</div>
    <div class="app-count" id="appCount"></div>
  </div>
  <div class="app-grid" id="appGrid"></div>
</div>

<div class="ctx" id="ctxMenu">
  <div class="ctx-item" onclick="ctxEdit()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit
  </div>
  <div class="ctx-item red" onclick="ctxDelete()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
    Delete
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-head">
      <h2 id="mTitle">Add Application</h2>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body">
      <div class="fg"><label>Icon</label><div class="ep" id="emojiPicker"></div></div>
      <div class="fg"><label>App Name</label><input type="text" id="fName" placeholder="e.g. GST Dashboard"/></div>
      <div class="fg"><label>URL (Link)</label><input type="url" id="fUrl" placeholder="https://yourapp.github.io"/></div>
      <div class="fg"><label>Colour Theme</label><div class="cg" id="colorGrid"></div></div>
    </div>
    <div class="m-foot">
      <button class="b-cancel" onclick="closeModal()">Cancel</button>
      <button class="b-save" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   ZOHO-STYLE COLORFUL SVG APP ICONS
   Each = 72×72 viewBox, white rounded-rect base,
   colorful multi-tone illustration on top
   ══════════════════════════════════════════════ */
const LOGOS = {

  /* TASK FLOWS — purple header kanban board */
  'task-flows': `<svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="72" height="72" rx="18" fill="white"/>
    <!-- header bar -->
    <rect x="11" y="11" width="50" height="13" rx="4.5" fill="#875A7B"/>
    <!-- column bg -->
    <rect x="11" y="28" width="14" height="30" rx="4" fill="#f0faf8"/>
    <rect x="29" y="28" width="14" height="30" rx="4" fill="#eef5fd"/>
    <rect x="47" y="28" width="14" height="30" rx="4" fill="#f3f0fb"/>
    <!-- col 1 cards -->
    <rect x="13.5" y="31" width="9" height="6" rx="2" fill="#00b894"/>
    <rect x="13.5" y="40" width="9" height="6" rx="2" fill="#00b894" opacity="0.5"/>
    <!-- col 2 cards -->
    <rect x="31.5" y="31" width="9" height="6" rx="2" fill="#0984e3"/>
    <rect x="31.5" y="40" width="9" height="6" rx="2" fill="#74b9ff" opacity="0.7"/>
    <!-- col 3 card with checkmark -->
    <rect x="49.5" y="31" width="9" height="6" rx="2" fill="#6c5ce7"/>
    <polyline points="51.2,34 53.5,36.5 57.5,31.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- header dots -->
    <circle cx="17" cy="17.5" r="2" fill="white" opacity="0.7"/>
    <circle cx="36" cy="17.5" r="2" fill="white" opacity="0.7"/>
    <circle cx="55" cy="17.5" r="2" fill="white" opacity="0.7"/>
  </svg>`,

  /* GST AUDIT — warm amber invoice + magnifier */
  'gst-audit': `<svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="72" height="72" rx="18" fill="white"/>
    <!-- document -->
    <rect x="9" y="8" width="34" height="44" rx="5" fill="#fff8e1"/>
    <rect x="9" y="8" width="34" height="44" rx="5" stroke="#f39c12" stroke-width="1.8"/>
    <!-- folded corner -->
    <path d="M33 8 L43 18 L33 18 Z" fill="#ffe082" stroke="#f39c12" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- ruled lines -->
    <line x1="15" y1="25" x2="35" y2="25" stroke="#f39c12" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="15" y1="31" x2="35" y2="31" stroke="#f39c12" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="15" y1="37" x2="26" y2="37" stroke="#f39c12" stroke-width="1.6" stroke-linecap="round"/>
    <!-- GST badge -->
    <rect x="13" y="42" width="22" height="7" rx="3" fill="#f39c12"/>
    <text x="24" y="47.5" font-family="'Nunito',sans-serif" font-weight="800" font-size="5.8" fill="white" text-anchor="middle" letter-spacing="0.8">GST</text>
    <!-- magnifier handle + circle -->
    <circle cx="51" cy="51" r="13" fill="#fff3e0"/>
    <circle cx="51" cy="51" r="13" stroke="#f39c12" stroke-width="1.8"/>
    <circle cx="49.5" cy="49.5" r="5.5" stroke="#e67e22" stroke-width="2.2" fill="none"/>
    <line x1="53.5" y1="53.5" x2="58.5" y2="58.5" stroke="#e67e22" stroke-width="2.4" stroke-linecap="round"/>
    <!-- shine -->
    <circle cx="47.5" cy="47" r="1.5" fill="white" opacity="0.7"/>
  </svg>`,

  /* MSME RETURN — green building with return arrow */
  'msme-return': `<svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="72" height="72" rx="18" fill="white"/>
    <!-- building base -->
    <rect x="14" y="28" width="30" height="28" rx="3" fill="#e8f8f3"/>
    <rect x="14" y="28" width="30" height="28" rx="3" stroke="#00b894" stroke-width="1.8"/>
    <!-- roof triangle -->
    <path d="M11 29 L29 13 L47 29 Z" fill="#00b894" stroke="#00b894" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- door -->
    <rect x="24" y="42" width="10" height="14" rx="2.5" fill="#00b894" opacity="0.8"/>
    <circle cx="32" cy="49.5" r="1.2" fill="white"/>
    <!-- windows -->
    <rect x="17" y="33" width="7" height="6" rx="1.5" fill="#00b894" opacity="0.5"/>
    <rect x="34" y="33" width="7" height="6" rx="1.5" fill="#00b894" opacity="0.5"/>
    <!-- MSME chip -->
    <rect x="12" y="13" width="18" height="7" rx="3" fill="#00b894"/>
    <text x="21" y="18.2" font-family="'Nunito',sans-serif" font-weight="800" font-size="4.8" fill="white" text-anchor="middle" letter-spacing="0.4">MSME</text>
    <!-- return arrow (circular) -->
    <path d="M52 35 C62 35 66 44 60 51" stroke="#00b894" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <polyline points="56.5,48.5 60.5,52 57,56" stroke="#00b894" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>`,

  /* VENDOR ONBOARDING — handshake + checklist */
  'vendor-onboarding': `<svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="72" height="72" rx="18" fill="white"/>
    <!-- clipboard body -->
    <rect x="22" y="16" width="30" height="38" rx="4" fill="#fff3e0"/>
    <rect x="22" y="16" width="30" height="38" rx="4" stroke="#e67e22" stroke-width="1.8"/>
    <!-- clipboard top clip -->
    <rect x="30" y="12" width="14" height="8" rx="3" fill="#e67e22"/>
    <rect x="33" y="14" width="8" height="4" rx="1.5" fill="white" opacity="0.6"/>
    <!-- checklist rows -->
    <circle cx="29" cy="29" r="2.5" fill="#e67e22" opacity="0.3"/>
    <circle cx="29" cy="29" r="2.5" stroke="#e67e22" stroke-width="1.4" fill="none"/>
    <line x1="34" y1="29" x2="46" y2="29" stroke="#e67e22" stroke-width="1.6" stroke-linecap="round"/>
    <!-- row 2 checked -->
    <circle cx="29" cy="37" r="2.5" fill="#e67e22"/>
    <polyline points="27.5,37 28.8,38.5 31,35.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="34" y1="37" x2="46" y2="37" stroke="#e67e22" stroke-width="1.6" stroke-linecap="round"/>
    <!-- row 3 checked -->
    <circle cx="29" cy="45" r="2.5" fill="#e67e22"/>
    <polyline points="27.5,45 28.8,46.5 31,43.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="34" y1="45" x2="42" y2="45" stroke="#e67e22" stroke-width="1.6" stroke-linecap="round"/>
    <!-- person icon bottom-right -->
    <circle cx="57" cy="52" r="6" fill="#fff3e0" stroke="#e67e22" stroke-width="1.8"/>
    <circle cx="57" cy="50" r="2" fill="#e67e22"/>
    <path d="M53 57 Q57 54 61 57" stroke="#e67e22" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  </svg>`,

const PALETTE_COLORS = [
  '#875A7B','#00a09d','#e2a925','#1e73be','#28b463',

function fallbackSVG(em, ci) {
  const c = PALETTE_COLORS[ci || 0];
  return `<svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="72" height="72" rx="18" fill="${c}"/>

];

let apps = JSON.parse(localStorage.getItem('gsys_apps7') || 'null') || JSON.parse(JSON.stringify(DEFAULTS));
let nid = Math.max(...apps.map(a => a.id), 0) + 1;
let editId = null, ctxId = null, selEmoji = EMOJIS[0], selCi = 0;

function render(q = '') {
  const grid = document.getElementById('appGrid');
  document.getElementById('secLabel').textContent = q ? `Results for "${q}"` : 'My Applications';
  const list = q ? apps.filter(a => a.name.toLowerCase().includes(q.toLowerCase())) : apps;
  document.getElementById('appCount').textContent = list.length + (list.length === 1 ? ' app' : ' apps');

  let h = list.map((a, i) => {
    const icon = (a.logoKey && LOGOS[a.logoKey]) ? LOGOS[a.logoKey] : fallbackSVG(a.emoji, a.ci);
    return `
    <a class="app-tile" href="${a.url}" target="_blank"
       style="animation-delay:${i * 0.055}s"
       oncontextmenu="showCtx(event,${a.id})">
      <div class="app-icon-wrap">${icon}</div>
      <span class="app-name">${a.name}</span>
    </a>`;
  }).join('');

  h += `<div class="add-tile" onclick="openModal(null)" style="animation-delay:${list.length * 0.055}s">
    <div class="add-icon-wrap">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10" stroke-dasharray="3 2.2"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </div>
    <span class="app-name">Add App</span>
  </div>`;

  grid.innerHTML = h;
}

function filterApps(v) { render(v); }

function openModal(id) {
  editId = id;
  if (id !== null) {
    const a = apps.find(x => x.id === id);
    document.getElementById('fName').value = a.name;
    document.getElementById('fUrl').value = a.url;
    selEmoji = a.emoji; selCi = a.ci || 0;
    document.getElementById('mTitle').textContent = 'Edit Application';
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fUrl').value = '';
    selEmoji = EMOJIS[0]; selCi = 0;
    document.getElementById('mTitle').textContent = 'Add Application';
  }
  buildPickers();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });

function buildPickers() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
    `<div class="eo${e === selEmoji ? ' sel' : ''}" onclick="pickEmoji('${e}',this)">${e}</div>`).join('');
  document.getElementById('colorGrid').innerHTML = PALETTES.map((p, i) =>
    `<div class="cs${i === selCi ? ' sel' : ''}" style="background:${p}" onclick="pickColor(${i},this)"></div>`).join('');
}
function pickEmoji(e, el) { selEmoji = e; document.querySelectorAll('.eo').forEach(x => x.classList.remove('sel')); el.classList.add('sel'); }
function pickColor(i, el) { selCi = i; document.querySelectorAll('.cs').forEach(x => x.classList.remove('sel')); el.classList.add('sel'); }

function saveApp() {
  const name = document.getElementById('fName').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  if (!name || !url) { alert('Name and URL are required.'); return; }
  if (editId !== null) {
    const i = apps.findIndex(a => a.id === editId);
    apps[i] = { ...apps[i], name, url, emoji: selEmoji, ci: selCi, logoKey: null };
  } else {
    apps.push({ id: nid++, name, url, emoji: selEmoji, ci: selCi, logoKey: null });
  }
  save(); closeModal(); render();
}

function showCtx(e, id) {
  e.preventDefault(); ctxId = id;
  const m = document.getElementById('ctxMenu');
  m.style.top = e.clientY + 'px'; m.style.left = e.clientX + 'px';
  m.classList.add('show');
}
function ctxEdit() { closeCtx(); openModal(ctxId); }
function ctxDelete() {
  if (confirm('Remove this app?')) { apps = apps.filter(a => a.id !== ctxId); save(); render(); }
  closeCtx();
}
function closeCtx() { document.getElementById('ctxMenu').classList.remove('show'); }
document.addEventListener('click', closeCtx);
function save() { localStorage.setItem('gsys_apps7', JSON.stringify(apps)); }

render();
</script>
